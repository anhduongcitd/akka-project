<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Streaming Demo - Online Payment Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .demo-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .response-area {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            margin-top: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .streaming {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .error {
            color: #d32f2f;
            background: #ffebee;
            border-color: #d32f2f;
        }

        .complete {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status.idle {
            background: #e0e0e0;
            color: #666;
        }

        .status.streaming {
            background: #667eea;
            color: white;
            animation: pulse 1.5s infinite;
        }

        .status.complete {
            background: #4caf50;
            color: white;
        }

        .status.error {
            background: #d32f2f;
            color: white;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-box h3 {
            color: #1976d2;
            margin-bottom: 10px;
        }

        .info-box p {
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Agent Streaming Demo</h1>

        <div class="info-box">
            <h3>Real-Time Agent Streaming</h3>
            <p>Experience real-time responses from AI agents with token-by-token streaming. Watch as the agent thinks and responds in real-time, providing a more engaging user experience.</p>
        </div>

        <!-- Customer Support Streaming -->
        <div class="demo-section">
            <h2>💬 Customer Support Agent (Token Streaming)</h2>
            <div class="input-group">
                <label for="support-customer-id">Customer ID:</label>
                <input type="text" id="support-customer-id" value="cust_123" placeholder="Enter customer ID">
            </div>
            <div class="input-group">
                <label for="support-query">Your Question:</label>
                <textarea id="support-query" placeholder="e.g., Where is my payment for transaction txn_abc123?">Where is my payment for transaction txn_abc123?</textarea>
            </div>
            <button id="support-stream-btn" onclick="streamSupport(false)">Stream Response (Token by Token)</button>
            <button id="support-grouped-btn" onclick="streamSupport(true)">Stream Response (Grouped)</button>
            <div id="support-status" class="status idle">Idle</div>
            <div id="support-response" class="response-area"></div>
        </div>
    </div>

    <script>
        function streamSupport(grouped) {
            const customerId = document.getElementById('support-customer-id').value;
            const query = document.getElementById('support-query').value;
            const responseDiv = document.getElementById('support-response');
            const statusDiv = document.getElementById('support-status');
            const btn1 = document.getElementById('support-stream-btn');
            const btn2 = document.getElementById('support-grouped-btn');

            if (!customerId || !query) {
                alert('Please fill in all fields');
                return;
            }

            responseDiv.textContent = '';
            responseDiv.className = 'response-area streaming';
            statusDiv.textContent = 'Streaming...';
            statusDiv.className = 'status streaming';
            btn1.disabled = true;
            btn2.disabled = true;

            const url = grouped ? '/stream/support/grouped' : '/stream/support';
            const body = JSON.stringify({
                sessionId: null,
                customerId: customerId,
                query: query
            });

            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: body
            })
            .then(response => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                function readStream() {
                    reader.read().then(({ done, value }) => {
                        if (done) {
                            responseDiv.className = 'response-area complete';
                            statusDiv.textContent = 'Complete';
                            statusDiv.className = 'status complete';
                            btn1.disabled = false;
                            btn2.disabled = false;
                            return;
                        }

                        const chunk = decoder.decode(value, { stream: true });
                        responseDiv.textContent += chunk;

                        readStream();
                    });
                }

                readStream();
            })
            .catch(error => {
                responseDiv.className = 'response-area error';
                responseDiv.textContent = 'Error: ' + error.message;
                statusDiv.textContent = 'Error';
                statusDiv.className = 'status error';
                btn1.disabled = false;
                btn2.disabled = false;
            });
        }
    </script>
</body>
</html>
