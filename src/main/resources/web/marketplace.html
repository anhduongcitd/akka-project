<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Marketplace - Online Payment Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .filters {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group label {
            font-weight: 600;
            color: #333;
        }

        select, input[type="text"] {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            min-width: 200px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .template-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .template-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .template-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .template-title {
            font-size: 1.4em;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .template-category {
            display: inline-block;
            padding: 5px 12px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .template-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .template-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #666;
            font-size: 0.9em;
        }

        .stat-icon {
            font-size: 1.2em;
        }

        .template-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .template-author {
            color: #999;
            font-size: 0.9em;
        }

        .deploy-btn {
            background: #4caf50;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .deploy-btn:hover {
            background: #45a049;
        }

        .rating {
            color: #ffa726;
            font-weight: 600;
        }

        .no-templates {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            color: #666;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            margin: 40px 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.8em;
            color: #333;
        }

        .close-btn {
            background: #f44336;
            padding: 5px 15px;
            font-size: 0.9em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏪 Agent Marketplace</h1>

        <div class="filters">
            <div class="filter-group">
                <label for="category-filter">Category:</label>
                <select id="category-filter" onchange="filterTemplates()">
                    <option value="all">All Categories</option>
                    <option value="customer-support">Customer Support</option>
                    <option value="fraud">Fraud Detection</option>
                    <option value="analytics">Analytics</option>
                    <option value="general">General</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="search-input">Search:</label>
                <input type="text" id="search-input" placeholder="Search templates..." onkeyup="handleSearch(event)">
                <button onclick="searchTemplates()">Search</button>
            </div>

            <button onclick="loadTopRated()">⭐ Top Rated</button>
            <button onclick="loadPopular()">🔥 Popular</button>
            <button onclick="loadAll()">🔄 Refresh</button>
        </div>

        <div id="loading" class="loading" style="display: none;">Loading templates...</div>

        <div id="templates-container" class="templates-grid"></div>

        <div id="no-templates" class="no-templates" style="display: none;">
            <h2>No templates found</h2>
            <p>Try adjusting your filters or search criteria.</p>
        </div>
    </div>

    <!-- Deploy Modal -->
    <div id="deploy-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Deploy Template</div>
                <button class="close-btn" onclick="closeDeployModal()">Close</button>
            </div>

            <div class="info-box">
                <strong>Template:</strong> <span id="deploy-template-name"></span>
            </div>

            <form id="deploy-form" onsubmit="deployTemplate(event)">
                <div class="form-group">
                    <label for="agent-id">Agent ID:</label>
                    <input type="text" id="agent-id" required placeholder="e.g., my-support-agent-001">
                </div>

                <div class="form-group">
                    <label for="custom-prompt">Custom System Prompt (optional):</label>
                    <input type="text" id="custom-prompt" placeholder="Override system prompt...">
                </div>

                <button type="submit">Deploy Agent</button>
            </form>
        </div>
    </div>

    <script>
        let currentTemplateId = null;

        // Load all templates on page load
        window.onload = function() {
            loadAll();
        };

        function loadAll() {
            showLoading(true);
            fetch('/marketplace/templates')
                .then(response => response.json())
                .then(data => {
                    displayTemplates(data.templates);
                    showLoading(false);
                })
                .catch(error => {
                    console.error('Error:', error);
                    showLoading(false);
                    showNoTemplates();
                });
        }

        function filterTemplates() {
            const category = document.getElementById('category-filter').value;
            if (category === 'all') {
                loadAll();
                return;
            }

            showLoading(true);
            fetch(`/marketplace/templates/category/${category}`)
                .then(response => response.json())
                .then(data => {
                    displayTemplates(data.templates);
                    showLoading(false);
                })
                .catch(error => {
                    console.error('Error:', error);
                    showLoading(false);
                });
        }

        function searchTemplates() {
            const query = document.getElementById('search-input').value;
            if (!query) {
                loadAll();
                return;
            }

            showLoading(true);
            fetch(`/marketplace/templates/search?query=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    displayTemplates(data.templates);
                    showLoading(false);
                })
                .catch(error => {
                    console.error('Error:', error);
                    showLoading(false);
                });
        }

        function handleSearch(event) {
            if (event.key === 'Enter') {
                searchTemplates();
            }
        }

        function loadTopRated() {
            showLoading(true);
            fetch('/marketplace/templates/top-rated')
                .then(response => response.json())
                .then(data => {
                    displayTemplates(data.templates);
                    showLoading(false);
                })
                .catch(error => {
                    console.error('Error:', error);
                    showLoading(false);
                });
        }

        function loadPopular() {
            showLoading(true);
            fetch('/marketplace/templates/popular')
                .then(response => response.json())
                .then(data => {
                    displayTemplates(data.templates);
                    showLoading(false);
                })
                .catch(error => {
                    console.error('Error:', error);
                    showLoading(false);
                });
        }

        function displayTemplates(templates) {
            const container = document.getElementById('templates-container');
            const noTemplates = document.getElementById('no-templates');

            if (!templates || templates.length === 0) {
                showNoTemplates();
                return;
            }

            noTemplates.style.display = 'none';
            container.innerHTML = '';

            templates.forEach(template => {
                const card = createTemplateCard(template);
                container.appendChild(card);
            });
        }

        function createTemplateCard(template) {
            const card = document.createElement('div');
            card.className = 'template-card';

            card.innerHTML = `
                <div class="template-header">
                    <div>
                        <div class="template-title">${template.name}</div>
                        <span class="template-category">${template.category}</span>
                    </div>
                </div>
                <div class="template-description">${template.description}</div>
                <div class="template-stats">
                    <div class="stat">
                        <span class="stat-icon">📥</span>
                        <span>${template.downloads} downloads</span>
                    </div>
                    <div class="stat">
                        <span class="stat-icon">⭐</span>
                        <span class="rating">${template.rating.toFixed(1)}</span>
                        <span>(${template.ratingCount})</span>
                    </div>
                </div>
                <div class="template-footer">
                    <span class="template-author">by ${template.author}</span>
                    <button class="deploy-btn" onclick="openDeployModal('${template.templateId}', '${template.name}')">Deploy</button>
                </div>
            `;

            return card;
        }

        function openDeployModal(templateId, templateName) {
            currentTemplateId = templateId;
            document.getElementById('deploy-template-name').textContent = templateName;
            document.getElementById('deploy-modal').classList.add('active');
        }

        function closeDeployModal() {
            document.getElementById('deploy-modal').classList.remove('active');
            document.getElementById('deploy-form').reset();
        }

        function deployTemplate(event) {
            event.preventDefault();

            const agentId = document.getElementById('agent-id').value;
            const customPrompt = document.getElementById('custom-prompt').value;

            const customizations = {};
            if (customPrompt) {
                customizations.systemPrompt = customPrompt;
            }

            const requestBody = {
                agentId: agentId,
                customizations: customizations
            };

            fetch(`/marketplace/deploy/${currentTemplateId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            })
            .then(response => response.json())
            .then(data => {
                alert(`Template deployed successfully!\nDeployment ID: ${data.deploymentId}\nAgent ID: ${data.agentId}`);
                closeDeployModal();
                loadAll(); // Refresh to show updated download count
            })
            .catch(error => {
                alert('Error deploying template: ' + error.message);
            });
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showNoTemplates() {
            document.getElementById('templates-container').innerHTML = '';
            document.getElementById('no-templates').style.display = 'block';
        }
    </script>
</body>
</html>
