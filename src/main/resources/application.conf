# Google AI API Key
google.ai.api-key = "AIzaSyAtvMvseoTuhp4k6CijDYtPwJwsb9bzUCY"

# Akka Agent Configuration
akka.javasdk.agent {
  # Custom LLM provider (9router)
  openai {
    base-url = ${?LLM_BASE_URL}  # e.g., https://9router.ai/v1
    api-key = ${?LLM_API_KEY}
    model-id = ${?LLM_MODEL_ID}  # e.g., "gpt-4o", "claude-sonnet-4"
  }

  # Guardrails (runtime-enforced)
  guardrails {
    "pii-guard" {
      class = "com.example.payment.agents.guardrails.PaymentPIIGuard"
      agents = ["customer-support", "fraud-analyst", "payment-assistant"]
      category = PII
      use-for = ["model-request", "model-response"]
      report-only = false  # Abort if PII detected
    }

    "output-validation" {
      class = "com.example.payment.agents.guardrails.OutputValidationGuard"
      agents = ["customer-support", "payment-assistant"]
      category = POLICY
      use-for = ["model-response"]
      report-only = false  # Abort invalid outputs
    }

    "audit-logger" {
      class = "com.example.payment.agents.guardrails.AuditLoggerGuard"
      agents = ["customer-support", "fraud-analyst", "payment-assistant"]
      category = AUDIT
      use-for = ["model-request", "model-response"]
      report-only = true  # Log all agent decisions
    }
  }
}

# Online Payment Service Configuration
payment {
  # Stripe payment gateway
  stripe {
    api-key = ${?STRIPE_API_KEY}
  }

  # AWS SES for email notifications
  aws {
    access-key = ${?AWS_ACCESS_KEY_ID}
    secret-key = ${?AWS_SECRET_ACCESS_KEY}
    region = ${?AWS_REGION}
    ses {
      from-email = ${?SES_FROM_EMAIL}
    }
  }

  # Exchange rate API
  exchange-rate {
    api-url = ${?EXCHANGE_RATE_API_URL}
    api-key = ${?EXCHANGE_RATE_API_KEY}
  }

  # Payment processing timeouts
  timeouts {
    payment-processing = 180s  # 3 minutes
    duplicate-detection-window = 60s  # 1 minute
  }
}
